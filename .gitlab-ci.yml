stages:
  - test
  - build
  - deploy

variables:
  POSTGRES_DB: giano_test
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  POSTGRES_HOST_AUTH_METHOD: trust

# ── Backend tests ────────────────────────────────────────────
backend:test:
  stage: test
  image: eclipse-temurin:17-jdk-alpine
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres/giano_test
    SPRING_DATASOURCE_USERNAME: test
    SPRING_DATASOURCE_PASSWORD: test
    SPRING_DATA_REDIS_HOST: redis
  script:
    - cd backend
    - ./mvnw test
  artifacts:
    when: always
    reports:
      junit: backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/site/jacoco/
    expire_in: 1 week
  cache:
    key: backend-$CI_COMMIT_REF_SLUG
    paths:
      - backend/.m2/repository/

# ── Frontend build ───────────────────────────────────────────
frontend:build:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/

# ── Docker image build ───────────────────────────────────────
docker:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  only:
    - main
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE ./backend
    - docker push $IMAGE
    - docker tag $IMAGE $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/backend:latest

# ── Deploy to VPS ─────────────────────────────────────────────
deploy:production:
  stage: deploy
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh deploy@$SSH_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $CI_REGISTRY_IMAGE/backend:latest &&
        cd /opt/giano &&
        docker compose -f docker-compose.prod.yml up -d --no-deps app
      "