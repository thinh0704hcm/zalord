# Loki config — dev/local mode. Single-instance, filesystem storage, no auth.
# Production: replace filesystem with S3/GCS, add auth, use Loki Distributed.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention: keep logs 7 days locally (matches Prometheus retention).
limits_config:
  retention_period: 168h                 # 7d
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 721h                 # 30d worth of queryable window
  max_query_parallelism: 8
  ingestion_rate_mb: 8                   # 8 MB/s per tenant
  ingestion_burst_size_mb: 16
  # Grafana Explore + label suggestions need this bumped up on 12+ services.
  max_label_names_per_series: 30

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Disable telemetry ping-home (unnecessary noise for dev).
analytics:
  reporting_enabled: false
