# zalord Redis config
# AOF on so refresh tokens / session registry / sequence IDs survive restarts.

appendonly yes
appendfsync everysec

# Bind to all interfaces inside the container; container network isolates us.
bind 0.0.0.0
protected-mode no

# Keep memory in check (matches docker-compose mem_limit).
maxmemory 200mb
maxmemory-policy noeviction
