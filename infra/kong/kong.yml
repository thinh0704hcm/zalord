_format_version: "3.0"

# ─────────────────────────────────────────────────────────────────────────────
# Security split — Kong AUTHENTICATES, services AUTHORIZE.
#
#   Kong (here):  verify the JWT signature + exp (jwt plugin), then inject
#                 X-User-Id and X-User-Roles from the validated token
#                 (pre-function). That is ALL the gateway does.
#   Services:     decide what an identity may do — role checks and
#                 resource-ownership checks live in the service code
#                 (e.g. AuthController.requireRole reads X-User-Roles).
#
# Do NOT put authorization logic (role gates, ownership rules) in Lua here.
# It can't see service data, it's untestable, and a gateway-only check is a
# single point of failure. Keep every protected route to the same two plugins.
# ─────────────────────────────────────────────────────────────────────────────

# Shared plugin definitions. Declared here as GLOBAL but `enabled: false`
# (so they do nothing on their own), then activated per-route below via a YAML
# merge (`<<:` + `enabled: true`). Defining them here — not inside a route —
# means deleting any single route never breaks the others' plugins.
plugins:
  # Expose Kong's request/latency/status metrics in Prometheus format on the
  # admin port at /metrics. Per-route + per-consumer dimensions stay off for
  # now — high cardinality, mostly noise until we need it.
  - name: prometheus
    enabled: true
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: false
      bandwidth_metrics: false

  - name: cors
    enabled: true
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

  # Default per-IP throttle applied to EVERY proxied request. Loose enough
  # that normal use never trips it; tight enough that a runaway client gets
  # 429 before they fill anyone's queue. Policy=local because we only run
  # one Kong replica; switch to "redis" if we ever scale Kong horizontally.
  - name: rate-limiting
    enabled: true
    config:
      minute: 600          # 10 req/s sustained per IP — generous for chat UX
      policy: local
      fault_tolerant: true # if the limit store breaks, let traffic through
      hide_client_headers: false

  - &jwt-def
    name: jwt
    enabled: false
    config:
      claims_to_verify:
        - exp

  # NOTE: per-route stricter throttle (10/min/IP for auth endpoints) is
  # inlined directly in each route's plugins block below. Kong's declarative
  # config treats a top-level plugin with no route/service as global; we
  # already declared one rate-limiting plugin globally, and declaring a
  # second top-level instance would collide on the same primary key. Inline
  # config is the cleanest way to override the global value per route.

  - &identity-def
    name: pre-function
    enabled: false
    config:
      access:
        - |
          -- Decode the (already signature-verified) JWT and forward identity as
          -- headers. cjson parses the payload properly — no regex on JSON.
          local cjson = require("cjson.safe")

          -- Strip any client-supplied identity headers so they can't be forged.
          kong.service.request.clear_header("X-User-Id")
          kong.service.request.clear_header("X-User-Roles")

          local auth = kong.request.get_header("authorization")
          local token
          if auth then
            token = auth:match("^[Bb]earer%s+(.+)$")
          end
          
          if not token then
            token = kong.request.get_query_arg("token")
          end

          if not token then return end

          local payload_b64 = token:match("^[^.]+%.([^.]+)%.[^.]+$")
          if not payload_b64 then return end

          -- base64url -> base64 (+ padding) so ngx.decode_base64 can read it
          payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
          local pad = #payload_b64 % 4
          if pad > 0 then payload_b64 = payload_b64 .. string.rep("=", 4 - pad) end

          local json = ngx.decode_base64(payload_b64)
          if not json then return end

          local claims = cjson.decode(json)
          if type(claims) ~= "table" then return end

          if claims.sub then
            kong.service.request.set_header("X-User-Id", claims.sub)
          end

          -- roles claim is a JSON array: "roles":["ADMIN","USER"]
          local roles = claims.roles
          if type(roles) == "table" then
            kong.service.request.set_header("X-User-Roles", table.concat(roles, ","))
          elseif type(roles) == "string" then
            kong.service.request.set_header("X-User-Roles", roles)
          end

services:
  # ── auth-service ──────────────────────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:8081
    routes:
      # Public — no token required. Tight rate-limit here OVERRIDES the
      # global default — Kong picks the more-specific plugin per route.
      - name: auth-public
        strip_path: false
        paths:
          - "/api/v1/auth/register"
          - "/api/v1/auth/login"
          - "/api/v1/auth/refresh"
          - "/api/v1/auth/logout"
        plugins:
          - name: rate-limiting
            enabled: true
            config:
              minute: 10
              policy: local
              fault_tolerant: true
              hide_client_headers: false

      # Admin-only — token verified here; ADMIN enforced in the controller
      # via the injected X-User-Roles header.
      - name: auth-admin
        strip_path: false
        paths:
          - "/api/v1/auth/create-admin"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true
          - name: rate-limiting
            enabled: true
            config:
              minute: 10
              policy: local
              fault_tolerant: true

  # ── user-service: protected — same identity injection ─────────────────────
  - name: user-service
    url: http://user-service:8082
    routes:
      - name: user-all
        strip_path: false
        paths:
          - "/api/v1/users"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true

  # ── notification-service: protected — bell-icon feed ──────────────────────
  - name: notification-service
    url: http://notification-service:8087
    routes:
      - name: notification-all
        strip_path: false
        paths:
          - "/api/v1/notifications"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true

  # ── media-service: protected — presigned upload/download URLs ─────────────
  - name: media-service
    url: http://media-service:8086
    routes:
      - name: media-all
        strip_path: false
        paths:
          - "/api/v1/media"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true

  # ── group-service: protected — groups + members ───────────────────────────
  - name: group-service
    url: http://group-service:8085
    routes:
      - name: group-all
        strip_path: false
        paths:
          - "/api/v1/groups"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true

  # ── chat-service: WebSocket gateway ───────────────────────────────────────
  # /ws/chat is an HTTP upgrade. The jwt plugin runs on the handshake; once
  # upgraded, Kong proxies bytes both ways. Browsers can't set custom headers
  # on a WebSocket connection — jwt plugin is configured to ALSO accept the
  # token via ?token=... query param.
  - name: chat-service
    url: http://chat-service:8084
    routes:
      - name: chat-ws
        strip_path: false
        paths:
          - "/ws/chat"
        plugins:
          - name: jwt
            enabled: true
            config:
              claims_to_verify:
                - exp
              uri_param_names:
                - token
              header_names:
                - authorization
          - <<: *identity-def
            enabled: true

  # ── message-service: protected — conversations + messages + inbox (CQRS) ──
  - name: message-service
    url: http://message-service:8083
    routes:
      - name: message-all
        strip_path: false
        paths:
          - "/api/v1/conversations"
          - "/api/v1/messages"
          - "/api/v1/inbox"
        plugins:
          - <<: *jwt-def
            enabled: true
          - <<: *identity-def
            enabled: true

  # ── API docs (dev only, public) ───────────────────────────────────────────
  # Aggregated Swagger UI lives in its own container; Kong serves it at /docs
  # and exposes each service's raw OpenAPI JSON at /api-docs/<service>. All
  # same-origin (localhost:8080) so the browser hits no CORS. No JWT here —
  # docs are open in dev. Add one auth-docs-style block per new service.
  - name: swagger-ui
    url: http://swagger-ui:8080
    routes:
      - name: swagger-ui-route
        strip_path: false
        paths:
          - "/docs"

  - name: auth-docs
    url: http://auth-service:8081/v3/api-docs   # service path; strip_path rewrites to it
    routes:
      - name: auth-docs-route
        strip_path: true
        paths:
          - "/api-docs/auth"

  - name: user-docs
    url: http://user-service:8082/v3/api-docs
    routes:
      - name: user-docs-route
        strip_path: true
        paths:
          - "/api-docs/user"

  - name: message-docs
    url: http://message-service:8083/v3/api-docs
    routes:
      - name: message-docs-route
        strip_path: true
        paths:
          - "/api-docs/message"

  - name: group-docs
    url: http://group-service:8085/v3/api-docs
    routes:
      - name: group-docs-route
        strip_path: true
        paths:
          - "/api-docs/group"

  - name: media-docs
    url: http://media-service:8086/v3/api-docs
    routes:
      - name: media-docs-route
        strip_path: true
        paths:
          - "/api-docs/media"

  - name: notification-docs
    url: http://notification-service:8087/v3/api-docs
    routes:
      - name: notification-docs-route
        strip_path: true
        paths:
          - "/api-docs/notification"

# Consumer + JWT credential. `key` must equal the `iss` claim in issued tokens.
# The secret is NOT stored here — __JWT_SECRET__ is a placeholder that the Kong
# container substitutes at startup from the JWT_SECRET env var (see the kong
# service `command` in docker-compose.yml). The real value lives only in .env
# (gitignored) and must equal the auth-service JWT_SECRET.
consumers:
  - username: zalord-clients
    jwt_secrets:
      - key: zalord
        algorithm: HS256
        secret: "__JWT_SECRET__"
