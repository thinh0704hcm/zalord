# Kong declarative config (DB-less mode).
#
# Responsibilities:
#   1. Route public traffic to the right backend service.
#   2. Validate the JWT at the edge on protected routes (jwt plugin).
#   3. Inject trusted X-User-Id and X-User-Roles headers from the token's
#      `sub` and `roles` claims, so backend services NEVER parse a JWT
#      themselves (pre-function plugin). Any client-supplied copies of those
#      headers are stripped first, so they can't be forged.
#
# Route groups:
#   - auth public  : register/login/refresh/logout  -> no JWT (no token yet)
#   - auth admin   : create-admin                    -> JWT + roles (ADMIN check in service)
#   - user-service : /api/v1/users/**                -> JWT + identity injection
#
# IMPORTANT — the JWT must carry `iss` = the consumer credential `key` ("zalord")
# so the jwt plugin can pick the secret. auth-service sets this via JWT_ISSUER.
# The secret comes from JWT_SECRET via Kong's env vault ({vault://env/jwt-secret}).

_format_version: "3.0"

services:
  # ── auth-service ──────────────────────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:8081
    routes:
      # Public — no token required.
      - name: auth-public
        strip_path: false
        paths:
          - "/api/v1/auth/register"
          - "/api/v1/auth/login"
          - "/api/v1/auth/refresh"
          - "/api/v1/auth/logout"

      # Admin-only — token verified here; ADMIN enforced in the controller
      # via the injected X-User-Roles header.
      - name: auth-admin
        strip_path: false
        paths:
          - "/api/v1/auth/create-admin"
        plugins:
          - &jwt-plugin
            name: jwt
            config:
              claims_to_verify:
                - exp
          - &identity-plugin
            name: pre-function
            config:
              access:
                - |
                  -- Drop any client-supplied identity headers first, so a caller
                  -- can't forge them. The jwt plugin (runs after this and rejects
                  -- invalid tokens) guarantees these only reach the upstream when
                  -- the token is valid.
                  kong.service.request.clear_header("X-User-Id")
                  kong.service.request.clear_header("X-User-Roles")
                  local auth = kong.request.get_header("authorization")
                  if auth then
                    local token = auth:match("^[Bb]earer%s+(.+)$")
                    if token then
                      local payload_b64 = token:match("^[^.]+%.([^.]+)%.[^.]+$")
                      if payload_b64 then
                        payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
                        local pad = #payload_b64 % 4
                        if pad > 0 then
                          payload_b64 = payload_b64 .. string.rep("=", 4 - pad)
                        end
                        local json = ngx.decode_base64(payload_b64)
                        if json then
                          local sub = json:match('"sub"%s*:%s*"([^"]+)"')
                          if sub then
                            kong.service.request.set_header("X-User-Id", sub)
                          end
                          -- roles claim is a JSON array: "roles":["ADMIN","USER"]
                          local roles = json:match('"roles"%s*:%s*%[(.-)%]')
                          if roles then
                            roles = roles:gsub('"', ''):gsub('%s', '')
                            kong.service.request.set_header("X-User-Roles", roles)
                          end
                        end
                      end
                    end
                  end

  # ── user-service: protected — same identity injection ─────────────────────
  - name: user-service
    url: http://user-service:8082
    routes:
      - name: user-all
        strip_path: false
        paths:
          - "/api/v1/users"
        plugins:
          - *jwt-plugin
          - *identity-plugin

# Consumer + JWT credential. `key` must equal the `iss` claim in issued tokens.
consumers:
  - username: zalord-clients
    jwt_secrets:
      - key: zalord
        algorithm: HS256
        secret: "{vault://env/JWT_SECRET}"
