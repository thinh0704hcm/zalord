# zalord Nginx config — minimal bootstrap.
# T11 replaces this with real routing for /api/v1/* and /ws.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;

  # Conf.d holds per-service include files added in T11 (auth.conf, chat-ws.conf, ...).
  include /etc/nginx/conf.d/*.conf;

  server {
    listen 80 default_server;
    server_name _;

    # Healthcheck for compose's healthcheck probe.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Placeholder root — T11 adds /api/v1/* and /ws here.
    location / {
      return 503 "zalord gateway: not wired yet (Sprint 1 T11)\n";
      add_header Content-Type text/plain;
    }
  }
}
