  #     start_period: 30s
  #   mem_limit: 512m
  #   networks: [zalord-net]

  # ── user-service ──────────────────────────────────────────────────────────
  # Uncomment after initializing the Go project. See
  # docs/only-me/user-service-guide.md.
  #
  # user-service:
  #   build:
  #     context: ./backend/user-service
  #     dockerfile: Dockerfile
  #   container_name: zalord-user
  #   restart: unless-stopped
  #   depends_on:
  #     user-pg:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     PORT: "8080"
