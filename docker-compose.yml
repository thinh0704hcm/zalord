name: zalord

networks:
  zalord-net:
    driver: bridge

volumes:
  pgdata_auth:
  pgdata_user:
  redisdata:
  rabbitdata:

services:
  # ── Postgres: auth-service's database ─────────────────────────────────────
  auth-pg:
    image: postgres:16-alpine
    container_name: zalord-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth-db          
    ports:
      - "${POSTGRES_AUTH_HOST_PORT}:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
      - ./infra/postgres/init-auth.sql:/docker-entrypoint-initdb.d/init.sql:ro   # shared init.sql
    command: ["postgres", "-c", "shared_buffers=64MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d auth-db"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    mem_limit: 256m
    networks: [zalord-net]

  # ── Postgres: user-service's database ─────────────────────────────────────
  user-pg:
    image: postgres:16-alpine
    container_name: zalord-user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user-db
    ports:
      - "${POSTGRES_USER_HOST_PORT}:5432"
    volumes:
      - pgdata_user:/var/lib/postgresql/data
      - ./infra/postgres/init-user.sql:/docker-entrypoint-initdb.d/init.sql:ro   # shared init.sql
    command: ["postgres", "-c", "shared_buffers=64MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d user-db"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    mem_limit: 256m
    networks: [zalord-net]

  # ── Redis (shared — coordination layer by design) ─────────────────────────
  # Hosts cross-service keys: user:sessions:*, user:delivery:* (pubsub),
  # presence:*, conversation:seq:*. Splitting Redis per service would break
  # the multi-device fan-out pattern in docs/architecture.md.
  redis:
    image: redis:7-alpine
    container_name: zalord-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
    command: ["redis-server", "/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    mem_limit: 256m
    networks: [zalord-net]

  # ── RabbitMQ (event bus — outbox publisher → consumers) ───────────────────
  # Management UI on host port ${RABBITMQ_MGMT_HOST_PORT:-15672}.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: zalord-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 384m
    networks: [zalord-net]

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: zalord-auth
    restart: unless-stopped
    depends_on:
      auth-pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: "8081"
      POSTGRES_HOST: auth-pg      # hardcoded — this service only knows its own DB
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES}
      REFRESH_EXPIRY_DAYS: ${REFRESH_EXPIRY_DAYS}
      JWT_ISSUER: ${JWT_ISSUER}      # must equal kong.yml consumer key ("zalord")
    ports:
      - "${AUTH_SERVICE_HOST_PORT}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    mem_limit: 512m
    networks: [zalord-net]

  # ── user-service ──────────────────────────────────────────────────────────
  # Uncomment after initializing the Go project. See
  # docs/only-me/user-service-guide.md.
  #
  # user-service:
  #   build:
  #     context: ./backend/user-service
  #     dockerfile: Dockerfile
  #   container_name: zalord-user
  #   restart: unless-stopped
  #   depends_on:
  #     user-pg:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     PORT: "8082"
  #     POSTGRES_HOST: user-pg      # hardcoded — own DB only
  #     POSTGRES_PORT: "5432"
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     REDIS_HOST: redis
  #     REDIS_PORT: "6379"
  #     JWT_SECRET: ${JWT_SECRET}
  #     REFRESH_EXPIRY_DAYS: ${REFRESH_EXPIRY_DAYS}
  #   ports:
  #     - "${USER_SERVICE_HOST_PORT}:8082"
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health >/dev/null 2>&1"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 6
  #     start_period: 10s
  #   mem_limit: 128m
  #   networks: [zalord-net]

  # ── Kong (API Gateway, DB-less) ───────────────────────────────────────────
  # Validates JWT at the edge and injects X-User-Id so backend services never
  # parse a token. Declarative config in infra/kong/kong.yml.
  #   Proxy : host ${KONG_PROXY_HOST_PORT:-8080} -> 8000  (client traffic)
  #   Admin : host ${KONG_ADMIN_HOST_PORT:-8001} -> 8001  (config/debug; keep off public)
  kong:
    image: kong:3.7
    container_name: zalord-kong
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
      # Serverless pre-function (X-User-Id injection) needs the Lua sandbox.
      KONG_UNTRUSTED_LUA: "sandbox"
      # NOTE: the JWT secret is NOT passed via env — Kong's workers can't see
      # arbitrary env vars, so the env vault doesn't work. The secret is set
      # directly in the gitignored infra/kong/kong.yml (see kong.yml.example).
    ports:
      - "${KONG_PROXY_HOST_PORT:-8080}:8000"
      - "${KONG_ADMIN_HOST_PORT:-8001}:8001"
    volumes:
      - ./infra/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m
    networks: [zalord-net]