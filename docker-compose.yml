  #     JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS}
  #     JWT_ISSUER: ${JWT_ISSUER}
  #     JWT_AUDIENCE: ${JWT_AUDIENCE}
  #   ports:
  #     - "${AUTH_SERVICE_HOST_PORT:-8081}:8080"
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1"]
  #     interval: 10s
  #     timeout: 3s
