apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: zalord-prod
  annotations:
    konghq.com/plugins: jwt-header-injection
spec:
  parentRefs:
    - name: main
      namespace: kong
      sectionName: http
  hostnames:
    - "auth.zalord.vn"
  rules:
    - backendRefs:
        - name: auth-service
          port: 8081
---
