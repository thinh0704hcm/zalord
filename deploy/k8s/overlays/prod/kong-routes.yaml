apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-route
  namespace: zalord-prod
  annotations:
    konghq.com/plugins: jwt-header-injection
spec:
  parentRefs:
    - name: main
      namespace: kong
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/chat
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: chat-service
          port: 8084
---
