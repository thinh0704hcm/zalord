---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-kong-to-prod
  namespace: zalord-prod
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kong
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-route
  namespace: zalord-prod
  annotations:
    konghq.com/preserve-host: "true"
spec:
  parentRefs:
    - name: main
      namespace: kong
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /attachments
        - path:
            type: PathPrefix
            value: /avatars
      backendRefs:
        - name: minio
          port: 19000
