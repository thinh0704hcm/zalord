apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: zalord-staging
spec:
  selector:
    app: message-service
  ports:
    - name: http
      port: 8083
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: zalord-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: docker.io/${DOCKER_NAMESPACE}/zalord-message-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/app/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_SERVICE_NAME
              value: "message-service"
          envFrom:
            - configMapRef:
                name: message-service-config
            - configMapRef:
                name: shared-config
            - secretRef:
                name: message-service-secret
            - secretRef:
                name: shared-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
