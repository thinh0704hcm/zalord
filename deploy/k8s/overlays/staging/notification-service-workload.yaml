apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: zalord-staging
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8087
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: zalord-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: docker.io/${DOCKER_NAMESPACE}/zalord-notification-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8087
          envFrom:
            - configMapRef:
                name: notification-service-config
            - configMapRef:
                name: shared-config
            - secretRef:
                name: notification-service-secret
            - secretRef:
                name: shared-secret
          env:
            - name: DB_URI
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: MQ_URI
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@$(MQ_HOST):$(MQ_PORT)/"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "notification-service"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
