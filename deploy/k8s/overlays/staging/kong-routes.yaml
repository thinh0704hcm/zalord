apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-ingress
  namespace: zalord-staging
  annotations:
    konghq.com/plugins: jwt-header-injection
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: chat-service
                port:
                  number: 8084
          - path: /api/v1/chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8084
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8084
