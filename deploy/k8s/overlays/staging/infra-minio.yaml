apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-init-script
  namespace: zalord-staging
data:
  create-buckets.sh: |
    #!/usr/bin/env sh
    set -e

    ENDPOINT="${MINIO_ENDPOINT:-http://minio:9000}"
    ROOT_USER="${MINIO_ROOT_USER:-minioadmin}"
    ROOT_PASSWORD="${MINIO_ROOT_PASSWORD:-minioadmin}"
    BUCKET_AVATARS="${MINIO_BUCKET_AVATARS:-avatars}"
    BUCKET_ATTACHMENTS="${MINIO_BUCKET_ATTACHMENTS:-attachments}"

    echo "[minio-init] waiting for MinIO at $ENDPOINT ..."
    until mc alias set local "$ENDPOINT" "$ROOT_USER" "$ROOT_PASSWORD" >/dev/null 2>&1; do
        sleep 2
    done
    echo "[minio-init] MinIO ready"

    echo "[minio-init] Configuring CORS..."
    mc admin config set local api cors_allow_origin="*"
    mc admin service restart local || echo "Restart failed but continuing..."

    ensure_bucket() {
        local bucket="$1"
        if mc ls "local/$bucket" >/dev/null 2>&1; then
            echo "[minio-init] ✓ $bucket already exists"
        else
            mc mb "local/$bucket"
            echo "[minio-init] ✓ $bucket created"
        fi
    }

    ensure_bucket "$BUCKET_AVATARS"
    ensure_bucket "$BUCKET_ATTACHMENTS"

    echo "[minio-init] done"
    mc ls local
---
# Headless Service for k8s DNS resolution (minio.zalord-staging.svc)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: zalord-staging
spec:
  clusterIP: None
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
---
# Manual Endpoints pointing to host MinIO (runs on k3s node as systemd service)
apiVersion: v1
kind: Endpoints
metadata:
  name: minio
  namespace: zalord-staging
subsets:
  - addresses:
      - ip: 100.125.80.68   # Tailscale IP of oracle-vps (control-plane, runs host MinIO)
    ports:
      - port: 9000
        name: api
      - port: 9001
        name: console
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: zalord-staging
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: docker.io/minio/mc:latest
          command: ["/bin/sh", "/scripts/create-buckets.sh"]
          env:
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: media-service-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-service-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET_AVATARS
              value: avatars
            - name: MINIO_BUCKET_ATTACHMENTS
              value: attachments
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: minio-init-script
            defaultMode: 0755
