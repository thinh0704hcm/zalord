apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: zalord-dev
spec:
  selector:
    app: media-service
  ports:
    - name: http
      port: 8086
      targetPort: http
    - name: grpc
      port: 9086
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: zalord-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ${DOCKER_NAMESPACE}/zalord-media-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
            - name: grpc
              containerPort: 9086
          envFrom:
            - configMapRef:
                name: media-service-config
            - configMapRef:
                name: shared-config
            - secretRef:
                name: media-service-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
