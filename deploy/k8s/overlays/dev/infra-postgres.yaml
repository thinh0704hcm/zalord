apiVersion: v1
kind: Service
metadata:
  name: auth-pg
  namespace: zalord-dev
spec:
  clusterIP: None
  selector:
    app: auth-pg
  ports:
    - port: 5432
      name: psql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-pg
  namespace: zalord-dev
spec:
  serviceName: auth-pg
  replicas: 1
  selector:
    matchLabels:
      app: auth-pg
  template:
    metadata:
      labels:
        app: auth-pg
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          args: ["-c", "shared_buffers=64MB"]
          env:
            - name: POSTGRES_DB
              value: auth-db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: psql
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d auth-db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: init-sql
          configMap:
            name: auth-pg-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
