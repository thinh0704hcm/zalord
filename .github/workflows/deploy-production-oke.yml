name: Deploy Production OKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Commit SHA image tag for backend services (from CI build)'
        required: true
        type: string
      frontend_image_tag:
        description: 'Image tag for frontend (defaults to backend image_tag)'
        required: false
        type: string
      canary:
        description: 'Deploy as canary (split traffic 90/10)'
        required: false
        default: 'false'
        type: boolean
      canary_image_tag:
        description: 'Image tag for canary pods (defaults to image_tag)'
        required: false
        type: string
      canary_services:
        description: 'Space-separated services to canary (defaults to all). Only these get canary pods.'
        required: false
        type: string
      promote:
        description: 'Auto-promote canary to stable after smoke test (default: false for demo)'
        required: false
        default: 'false'
        type: boolean
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production-oke
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
      FRONTEND_IMAGE_TAG: ${{ github.event.inputs.frontend_image_tag || github.event.inputs.image_tag || github.ref_name }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-prod
      KUBECONFIG: /home/runner/.kube/oke.config
      CANARY: ${{ github.event.inputs.canary || 'false' }}
      CANARY_IMAGE_TAG: ${{ github.event.inputs.canary_image_tag || github.event.inputs.image_tag || github.ref_name }}
      CANARY_SERVICES: ${{ github.event.inputs.canary_services || '' }}
      PROMOTE: ${{ github.event.inputs.promote || 'false' }}
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service
        frontend
      # Service name → port mapping
      SERVICE_PORTS: >-
        auth-service:8081
        user-service:8082
        message-service:8083
        chat-service:8084
        group-service:8085
        media-service:8086
        notification-service:8087
        frontend:80

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$SOPS_AGE_KEY"
          test -n "$OKE_KUBECONFIG_B64"

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              || [ "${{ github.ref_type }}" = "tag" ] \
              || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "services=$SERVICE_IMAGES" >> "$GITHUB_OUTPUT"
            echo "restart_all=false" >> "$GITHUB_OUTPUT"
          else
            services=""
            for svc in $SERVICE_IMAGES; do
              if git diff --name-only "$before" "${{ github.sha }}" | grep -q "^backend/$svc/"; then
                services="$services $svc"
              fi
            done
            echo "services=$(echo "$services" | xargs)" >> "$GITHUB_OUTPUT"
            if git diff --name-only "$before" "${{ github.sha }}" \
                | grep -q "^deploy/k8s/overlays/prod/.*\(config\|secret\)"; then
              echo "restart_all=true" >> "$GITHUB_OUTPUT"
            else
              echo "restart_all=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Install deploy tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check image existence
        id: image-check
        run: |
          set -euo pipefail

          # Normal deploy: check images for all services
          deployable=""
          missing=""
          for svc in $SERVICE_IMAGES; do
            if [ "$svc" = "frontend" ]; then
              tag="$FRONTEND_IMAGE_TAG"
            else
              tag="$IMAGE_TAG"
            fi
            img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$tag"
            if docker manifest inspect "$img" >/dev/null 2>&1; then
              deployable="$deployable $svc"
            else
              missing="$missing $svc"
              echo "::warning::Image not found: $img — will skip $svc"
            fi
          done
          deployable="$(echo "$deployable" | xargs)"
          missing="$(echo "$missing" | xargs)"
          echo "deployable_services=$deployable" >> "$GITHUB_OUTPUT"
          echo "Deployable: $deployable"
          [ -n "$missing" ] && echo "::warning::Skipped missing normal images: $missing" || true

          # Canary deploy: check images for requested canary services
          canary_deployable=""
          canary_missing=""
          if [ "$CANARY" = "true" ]; then
            canary_svc_list="${CANARY_SERVICES:-$SERVICE_IMAGES}"
            for svc in $canary_svc_list; do
              img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG"
              if docker manifest inspect "$img" >/dev/null 2>&1; then
                canary_deployable="$canary_deployable $svc"
              else
                canary_missing="$canary_missing $svc"
                echo "::warning::Canary image not found: $img — will skip canary $svc"
              fi
            done
            canary_deployable="$(echo "$canary_deployable" | xargs)"
            canary_missing="$(echo "$canary_missing" | xargs)"
            echo "canary_deployable_services=$canary_deployable" >> "$GITHUB_OUTPUT"
            echo "Canary deployable: $canary_deployable"
            [ -n "$canary_missing" ] && echo "::warning::Skipped missing canary images: $canary_missing" || true
          fi

      - name: Configure OKE kubeconfig
        env:
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$OKE_KUBECONFIG_B64" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl config get-contexts
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-prod
          deployable="${{ steps.image-check.outputs.deployable_services }}"

          cp deploy/k8s/overlays/prod/*-config.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/infra-*.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-routes.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-plugins.yaml /tmp/zalord-k8s-prod/

          for secret in deploy/k8s/overlays/prod/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-prod/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          # Always include ALL workload files (image tag changes on every push)
          for f in deploy/k8s/overlays/prod/*-workload.yaml; do
            basename_f="$(basename "$f")"
            svc_name="${basename_f%-workload.yaml}"
            if grep -q '${IMAGE_TAG}' "$f" && ! echo "$deployable" | grep -qw "$svc_name"; then
              echo "  Skipping $basename_f (image not found in registry)"
              continue
            fi
            if [ "$svc_name" = "frontend" ] && [ -n "$FRONTEND_IMAGE_TAG" ]; then
              sed "s/\${IMAGE_TAG}/$FRONTEND_IMAGE_TAG/g" "$f" \
                | envsubst '${DOCKER_NAMESPACE}' > "/tmp/zalord-k8s-prod/$basename_f"
            else
              envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' < "$f" > "/tmp/zalord-k8s-prod/$basename_f"
            fi
          done

          if [ -z "$deployable" ]; then
            echo "::warning::No workload images found in registry — no image-tag workloads will be applied"
          fi

          for manifest in /tmp/zalord-k8s-prod/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-prod.yaml

      # ── Normal deploy (CANARY=false) ────────────────────────────
      - name: Apply manifests
        if: env.CANARY == 'false'
        run: |
          set -euo pipefail
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod.yaml

          services="${{ steps.filter.outputs.services }}"
          if [ -z "$services" ] && [ "${{ steps.filter.outputs.restart_all }}" = "true" ]; then
            if kubectl get deploy -n "$K8S_NAMESPACE" -o name | grep -q .; then
              kubectl rollout restart deployment -n "$K8S_NAMESPACE"
            fi
          fi

      - name: Wait for rollout
        if: env.CANARY == 'false'
        run: |
          set -euo pipefail
          services="${{ steps.filter.outputs.services }}"
          if [ -n "$services" ]; then
            # Wait for specific changed services
            for service in $services; do
              kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$service" --timeout=180s || true
            done
          else
            # No specific services detected — wait for all deployments
            for deploy in $(kubectl get deploy -n "$K8S_NAMESPACE" -o name 2>/dev/null); do
              kubectl rollout status -n "$K8S_NAMESPACE" "$deploy" --timeout=180s || true
            done
          fi
          kubectl get pods,svc -n "$K8S_NAMESPACE"

      # ── Canary deploy (CANARY=true) ─────────────────────────────
      - name: Deploy canary
        if: env.CANARY == 'true'
        run: |
          set -euo pipefail

          # 1. Deploy ALL services normally with IMAGE_TAG (stable)
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod.yaml

          # Wait for stable deployments to be ready
          for svc in $SERVICE_IMAGES; do
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$svc" --timeout=120s 2>/dev/null || true
          done

          # 2. Apply routes (includes canary traffic split)
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod/kong-routes.yaml 2>/dev/null || true

          # 3. Filter canary services against image existence
          canary_svcs="${CANARY_SERVICES:-}"
          canary_deployable="${{ steps.image-check.outputs.canary_deployable_services }}"
          if [ -z "$canary_svcs" ]; then
            echo "No canary_services specified, skipping canary deployments"
            kubectl get pods,svc -n "$K8S_NAMESPACE"
            exit 0
          fi

          filtered_canary=""
          for svc in $canary_svcs; do
            if echo "$canary_deployable" | grep -qw "$svc"; then
              filtered_canary="$filtered_canary $svc"
            else
              echo "::warning::Skipping canary for $svc (canary image $CANARY_IMAGE_TAG not found)"
            fi
          done
          filtered_canary="$(echo "$filtered_canary" | xargs)"

          if [ -z "$filtered_canary" ]; then
            echo "::warning::No canary services have images available — skipping canary deployments"
            kubectl get pods,svc -n "$K8S_NAMESPACE"
            exit 0
          fi

          for svc in $filtered_canary; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            echo "Creating canary for $svc (port $port, image tag: $CANARY_IMAGE_TAG)..."

            # Delete old canary if exists
            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true

            # Create canary from stable deployment spec, with CANARY_IMAGE_TAG
            kubectl get deploy "$svc" -n "$K8S_NAMESPACE" -o json \
              | jq --arg name "${svc}-canary" \
                   --arg image "docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG" \
                   --arg port "$port" \
                   '.metadata.name=$name |
                    .metadata.labels."app.kubernetes.io/component"="canary" |
                    del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.generation, .status) |
                    .spec.replicas=1 |
                    .spec.selector.matchLabels.app=$name |
                    .spec.template.metadata.labels.app=$name |
                    .spec.template.spec.containers[0].image=$image |
                    .spec.template.spec.containers[0].ports[0].containerPort=(($port | tonumber)) |
                    .spec.template.spec.containers[0].env = ((.spec.template.spec.containers[0].env // []) + [{"name":"CANARY","value":"true"}])' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Canary deployment: ${svc}-canary → $CANARY_IMAGE_TAG"

            # Create canary Service (required for HTTPRoute to route traffic)
            kubectl get svc "$svc" -n "$K8S_NAMESPACE" -o json \
              | jq --arg name "${svc}-canary" \
                   --argjson port "$port" \
                   '.metadata.name=$name |
                    del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp) |
                    .spec.selector.app=$name |
                    .spec.clusterIP="" |
                    .spec.clusterIPs=[]' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Canary service: ${svc}-canary:${port}"

            # Wait for canary to be ready
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/${svc}-canary" --timeout=120s || true
          done

          echo "=== Final state ==="
          kubectl get pods,svc -n "$K8S_NAMESPACE" -o wide

      - name: Shift traffic to canary
        if: env.CANARY == 'true' && env.CANARY_SERVICES != ''
        run: |
          set -euo pipefail
          for svc in $CANARY_SERVICES; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(echo "$svc" | sed 's/-service/-route/')

            kubectl patch httproute "$route_name" -n "$K8S_NAMESPACE" \
              --type=merge \
              --patch "{\"spec\":{\"rules\":[{\"backendRefs\":[{\"name\":\"$svc\",\"port\":$port,\"weight\":50},{\"name\":\"${svc}-canary\",\"port\":$port,\"weight\":50}]}]}}"
            echo "  Traffic: $route_name → 50% stable / 50% canary"
          done

          kubectl get httproute -n "$K8S_NAMESPACE"

      - name: Smoke test canary
        if: env.CANARY == 'true' && env.CANARY_SERVICES != ''
        run: |
          set -euo pipefail
          LB_IP=$(kubectl get svc kong-kong-proxy -n kong -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$LB_IP" ]; then
            echo "WARNING: No LB IP, skipping smoke test"
            exit 0
          fi

          # Map service → canary test endpoint
          canary_endpoint() {
            case "$1" in
              chat-service)           echo "chat.zalord.vn /api/v1/chat/canary" ;;
              *)                      echo "" ;;
            esac
          }

          echo "Smoke testing canary endpoints via $LB_IP..."
          total_v1=0
          total_v2=0
          for svc in $CANARY_SERVICES; do
            ep=$(canary_endpoint "$svc")
            if [ -z "$ep" ]; then
              echo "  WARNING: No canary endpoint defined for $svc, skipping"
              continue
            fi
            host=$(echo "$ep" | cut -d' ' -f1)
            path=$(echo "$ep" | cut -d' ' -f2)
            echo "  Testing $svc: Host=$host, Path=$path"
            v1_count=0
            v2_count=0
            for i in $(seq 1 10); do
              result=$(curl -s -H "Host: $host" "http://$LB_IP$path" --max-time 5 || echo '{"error":"timeout"}')
              version=$(echo "$result" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "v1(404)")
              if [ "$version" = "v1" ] || echo "$result" | grep -q "404"; then
                v1_count=$((v1_count + 1))
              else
                v2_count=$((v2_count + 1))
              fi
              echo "    Request $i: $version"
            done
            echo "  $svc traffic split: v1=$v1_count, v2=$v2_count (out of 10)"
            total_v1=$((total_v1 + v1_count))
            total_v2=$((total_v2 + v2_count))
          done
          echo ""
          echo "Total traffic split: v1=$total_v1, v2=$total_v2"

      - name: Promote canary to stable
        if: env.CANARY == 'true' && env.CANARY_SERVICES != '' && env.PROMOTE == 'true' && success()
        run: |
          set -euo pipefail
          for svc in $CANARY_SERVICES; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(echo "$svc" | sed 's/-service/-route/')

            echo "Promoting $svc..."
            kubectl set image deploy "$svc" \
              "$svc=docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG" \
              -n "$K8S_NAMESPACE"
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$svc" --timeout=120s

            kubectl patch httproute "$route_name" -n "$K8S_NAMESPACE" \
              --type=merge \
              --patch "{\"spec\":{\"rules\":[{\"backendRefs\":[{\"name\":\"$svc\",\"port\":$port,\"weight\":100}]}]}}"

            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            echo "  Promoted: $svc → $CANARY_IMAGE_TAG"
          done

          kubectl get pods,svc,httproute -n "$K8S_NAMESPACE"

      - name: Rollback canary
        if: env.CANARY == 'true' && env.CANARY_SERVICES != '' && failure()
        run: |
          set -euo pipefail
          echo "ROLLING BACK canary deployments..."
          for svc in $CANARY_SERVICES; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(echo "$svc" | sed 's/-service/-route/')

            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl patch httproute "$route_name" -n "$K8S_NAMESPACE" \
              --type=merge \
              --patch "{\"spec\":{\"rules\":[{\"backendRefs\":[{\"name\":\"$svc\",\"port\":$port,\"weight\":100}]}]}}"
            echo "  Rolled back: $svc"
          done
          kubectl get pods,svc,httproute -n "$K8S_NAMESPACE"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-prod /tmp/zalord-k8s-prod.yaml
          rm -f ~/.config/sops/age/keys.txt "$KUBECONFIG"
