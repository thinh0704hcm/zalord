name: Deploy Production OKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag for backend services (default: prod)'
        required: false
        default: 'prod'
        type: string
      frontend_image_tag:
        description: 'Image tag for frontend (defaults to image_tag)'
        required: false
        type: string
      services:
        description: 'Space-separated services to deploy (default: all)'
        required: false
        type: string
      image_refs:
        description: 'Optional per-service refs: service=image-ref service=image-ref'
        required: false
        type: string
      canary_enabled:
        description: 'Create canary deployments instead of replacing stable images'
        required: false
        default: false
        type: boolean
      canary_weight:
        description: 'Percent of HTTP traffic routed to canary (1-99)'
        required: false
        default: '10'
        type: string
      image_manifest_run_id:
        description: 'CI run ID with ci-image-manifest artifact (rollback/exact deploy)'
        required: false
        type: string
  workflow_run:
    workflows: ["CI — Dev"]
    types: [completed]

concurrency:
  group: deploy-production-oke
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !endsWith(github.event.workflow_run.head_branch, '-beta'))
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.image_tag || github.ref_name || 'prod' }}
      FRONTEND_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.frontend_image_tag || github.event.inputs.image_tag || github.ref_name || 'prod' }}
      INPUT_SERVICES: ${{ github.event.inputs.services || '' }}
      IMAGE_REFS: ${{ github.event.inputs.image_refs || '' }}
      CANARY_ENABLED: ${{ github.event.inputs.canary_enabled || false }}
      CANARY_WEIGHT: ${{ github.event.inputs.canary_weight || '10' }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-prod
      KUBECONFIG: /home/runner/.kube/oke.config
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service
        frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$SOPS_AGE_KEY"
          test -n "$OKE_KUBECONFIG_B64"

      - name: Download CI image metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: ci-image-metadata
          path: /tmp/ci-image-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Load CI image metadata
        id: ci-meta
        run: |
          set -euo pipefail
          updated_services=""
          if [ -f /tmp/ci-image-metadata/ci-image-metadata.env ]; then
            while IFS='=' read -r key value; do
              case "$key" in
                updated_services) updated_services="$value" ;;
              esac
            done < /tmp/ci-image-metadata/ci-image-metadata.env
          fi
          echo "updated_services=${updated_services:-}" >> "$GITHUB_OUTPUT"
          echo "CI updated services: ${updated_services:-none}"

      - name: Download CI image manifest
        if: github.event_name == 'workflow_run' || github.event.inputs.image_manifest_run_id != ''
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: ci-image-manifest
          path: /tmp/ci-image-manifest
          run-id: ${{ github.event.inputs.image_manifest_run_id || github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Load CI image manifest
        id: image-manifest
        run: |
          set -euo pipefail
          manifest=/tmp/ci-image-manifest/image-manifest.env
          if [ -s "$manifest" ]; then
            services=$(cut -d= -f1 "$manifest" | xargs)
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "services=$services" >> "$GITHUB_OUTPUT"
            echo "Digest manifest services: $services"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "No digest image manifest"
          fi

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          code_services=""
          services=""
          restart_all=false

          if [ "$event" = "workflow_run" ]; then
            code_services="${{ steps.ci-meta.outputs.updated_services }}"
            head="${{ github.event.workflow_run.head_sha || github.sha }}"
            base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            if [ -n "$base" ] && git diff --name-only "$base" "$head" \
                | grep -q "^deploy/k8s/overlays/prod/.*\(config\|secret\)"; then
              restart_all=true
            fi
            services="$code_services"
          elif [ "$event" = "workflow_dispatch" ]; then
            services="${INPUT_SERVICES:-$SERVICE_IMAGES}"
            code_services="$services"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            services="$SERVICE_IMAGES"
            code_services="$SERVICE_IMAGES"
          else
            before="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              services="$SERVICE_IMAGES"
            else
              for svc in $SERVICE_IMAGES; do
                if [ "$svc" = "frontend" ]; then
                  prefix="frontend/"
                else
                  prefix="backend/$svc/"
                fi
                if git diff --name-only "$before" "$head" | grep -q "^$prefix"; then
                  code_services="$code_services $svc"
                fi
              done
              code_services="$(echo "$code_services" | xargs)"
              services="$code_services"
              if git diff --name-only "$before" "$head" \
                  | grep -q "^deploy/k8s/overlays/prod/.*\(config\|secret\)"; then
                restart_all=true
              fi
            fi
          fi

          services="$(echo "$services" | xargs)"
          code_services="$(echo "$code_services" | xargs)"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "code_services=$code_services" >> "$GITHUB_OUTPUT"
          echo "restart_all=$restart_all" >> "$GITHUB_OUTPUT"
          echo "Detected services: ${services:-none}"
          echo "Changed code services: ${code_services:-none}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Install deploy tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check image existence
        id: image-check
        run: |
          set -euo pipefail

          manifest=/tmp/ci-image-manifest/image-manifest.env
          manual_refs=/tmp/manual-image-refs.env
          : > "$manual_refs"
          for pair in $IMAGE_REFS; do
            case "$pair" in
              *=*) printf '%s\n' "$pair" >> "$manual_refs" ;;
              *) echo "::warning::Ignoring invalid image_refs token: $pair" ;;
            esac
          done

          manual_image_ref_for() {
            local svc=$1
            [ -s "$manual_refs" ] || return 1
            awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manual_refs"
          }

          image_ref_for() {
            local svc=$1
            manual_image_ref_for "$svc" && return 0
            [ -s "$manifest" ] || return 1
            awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manifest"
          }

          image_exists() {
            local img=$1 svc=$2 tag=${3:-}
            docker manifest inspect "$img" >/dev/null 2>&1 && return 0
            [ -n "$tag" ] && curl -fsS "https://hub.docker.com/v2/repositories/$DOCKER_NAMESPACE/zalord-$svc/tags/$tag" >/dev/null 2>&1
          }

          if [ -n "${INPUT_SERVICES:-}" ]; then
            deploy_candidates="$INPUT_SERVICES"
          elif [ -s "$manual_refs" ]; then
            deploy_candidates=$(cut -d= -f1 "$manual_refs" | xargs)
          elif [ -s "$manifest" ]; then
            deploy_candidates=$(cut -d= -f1 "$manifest" | xargs)
          else
            deploy_candidates="${{ steps.filter.outputs.services }}"
            [ -n "$deploy_candidates" ] || deploy_candidates="$SERVICE_IMAGES"
          fi

          deployable=""
          missing=""
          for svc in $deploy_candidates; do
            if img=$(image_ref_for "$svc"); then
              tag=""
            elif [ "$svc" = "frontend" ]; then
              tag="$FRONTEND_IMAGE_TAG"
              img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$tag"
            else
              tag="$IMAGE_TAG"
              img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$tag"
            fi
            if image_exists "$img" "$svc" "$tag"; then
              deployable="$deployable $svc"
            else
              missing="$missing $svc"
              echo "::warning::Image not found: $img — will skip $svc"
            fi
          done
          deployable="$(echo "$deployable" | xargs)"
          missing="$(echo "$missing" | xargs)"
          echo "deployable_services=$deployable" >> "$GITHUB_OUTPUT"
          echo "Deployable: $deployable"
          [ -n "$missing" ] && echo "::warning::Skipped missing normal images: $missing" || true

      - name: Configure OKE kubeconfig
        env:
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$OKE_KUBECONFIG_B64" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl config get-contexts
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-prod
          deployable="${{ steps.image-check.outputs.deployable_services }}"
          canary_enabled="$CANARY_ENABLED"

          cp deploy/k8s/overlays/prod/*-config.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/infra-*.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-routes.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-plugins.yaml /tmp/zalord-k8s-prod/

          for secret in deploy/k8s/overlays/prod/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-prod/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          manifest=/tmp/ci-image-manifest/image-manifest.env
          manual_refs=/tmp/manual-image-refs.env
          manual_image_ref_for() {
            local svc=$1
            [ -s "$manual_refs" ] || return 1
            awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manual_refs"
          }

          image_ref_for() {
            local svc=$1
            manual_image_ref_for "$svc" && return 0
            [ -s "$manifest" ] || return 1
            awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manifest"
          }

          for f in deploy/k8s/overlays/prod/*-workload.yaml; do
            basename_f="$(basename "$f")"
            svc_name="${basename_f%-workload.yaml}"
            if [ "$canary_enabled" = "true" ] && echo "$deployable" | grep -qw "$svc_name"; then
              echo "  Skipping stable $basename_f (canary mode)"
              continue
            fi
            image_ref=""
            image_ref=$(image_ref_for "$svc_name" || true)
            if grep -q '${IMAGE_TAG}' "$f" && [ -z "$image_ref" ] && ! echo "$deployable" | grep -qw "$svc_name"; then
              echo "  Skipping $basename_f (image not found in registry)"
              continue
            fi
            if [ -n "$image_ref" ]; then
              sed "s#docker.io/\${DOCKER_NAMESPACE}/zalord-$svc_name:\${IMAGE_TAG}#$image_ref#g" "$f" \
                | envsubst '${DOCKER_NAMESPACE}' > "/tmp/zalord-k8s-prod/$basename_f"
            elif [ "$svc_name" = "frontend" ] && [ -n "$FRONTEND_IMAGE_TAG" ]; then
              sed "s/\${IMAGE_TAG}/$FRONTEND_IMAGE_TAG/g" "$f" \
                | envsubst '${DOCKER_NAMESPACE}' > "/tmp/zalord-k8s-prod/$basename_f"
            else
              envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' < "$f" > "/tmp/zalord-k8s-prod/$basename_f"
            fi
          done

          if [ -z "$deployable" ]; then
            echo "::warning::No workload images found in registry — no image-tag workloads will be applied"
          fi

          for manifest in /tmp/zalord-k8s-prod/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-prod.yaml

      - name: Apply manifests
        run: |
          set -euo pipefail
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod.yaml
          if [ -f /tmp/ci-image-manifest/image-manifest.yaml ]; then
            kubectl create configmap zalord-image-manifest -n "$K8S_NAMESPACE" \
              --from-file=image-manifest.yaml=/tmp/ci-image-manifest/image-manifest.yaml \
              --from-file=image-manifest.env=/tmp/ci-image-manifest/image-manifest.env \
              --dry-run=client -o yaml | kubectl apply -f -
          fi

          if [ "$CANARY_ENABLED" != "true" ]; then
            for svc in $SERVICE_IMAGES; do
              kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
              kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            done
          fi

      - name: Apply canary images
        if: env.CANARY_ENABLED == 'true'
        run: |
          set -euo pipefail
          services="${{ steps.image-check.outputs.deployable_services }}"
          test -n "$services" || { echo "No canary services selected"; exit 0; }
          case "$CANARY_WEIGHT" in ''|*[!0-9]*) echo "CANARY_WEIGHT must be 1-99"; exit 1 ;; esac
          if [ "$CANARY_WEIGHT" -lt 1 ] || [ "$CANARY_WEIGHT" -gt 99 ]; then
            echo "CANARY_WEIGHT must be 1-99"; exit 1
          fi
          stable_weight=$((100 - CANARY_WEIGHT))
          manifest=/tmp/ci-image-manifest/image-manifest.env
          manual_refs=/tmp/manual-image-refs.env

          image_ref_for() {
            local svc=$1
            if [ -s "$manual_refs" ]; then
              awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manual_refs" && return 0
            fi
            if [ -s "$manifest" ]; then
              awk -F= -v svc="$svc" '$1 == svc {print $2; found=1} END {exit found ? 0 : 1}' "$manifest" && return 0
            fi
            if [ "$svc" = "frontend" ]; then
              printf 'docker.io/%s/zalord-%s:%s\n' "$DOCKER_NAMESPACE" "$svc" "$FRONTEND_IMAGE_TAG"
            else
              printf 'docker.io/%s/zalord-%s:%s\n' "$DOCKER_NAMESPACE" "$svc" "$IMAGE_TAG"
            fi
          }

          route_for() {
            case "$1" in
              *-service) printf '%s-route\n' "${1%-service}" ;;
              *) printf '%s-route\n' "$1" ;;
            esac
          }

          for svc in $services; do
            image_ref="$(image_ref_for "$svc")"
            port="$(kubectl -n "$K8S_NAMESPACE" get svc "$svc" -o jsonpath='{.spec.ports[0].port}')"
            route="$(route_for "$svc")"
            echo "Canary $svc -> $image_ref (${CANARY_WEIGHT}%)"

            kubectl -n "$K8S_NAMESPACE" get deploy "$svc" -o json \
              | python3 -c 'import json,sys; svc,image=sys.argv[1],sys.argv[2]; src=json.load(sys.stdin); ns=src["metadata"]["namespace"]; labels=dict(src["metadata"].get("labels",{})); d={"apiVersion":src["apiVersion"],"kind":src["kind"],"metadata":{"name":f"{svc}-canary","namespace":ns,"labels":labels},"spec":src["spec"]}; canary_app=f"{svc}-canary"; d["metadata"]["labels"].update({"app":canary_app,"canary":"true"}); d["spec"]["replicas"]=1; d["spec"]["selector"]={"matchLabels":{"app":canary_app,"canary":"true"}}; d["spec"]["template"]["metadata"].setdefault("labels",{}).update({"app":canary_app,"canary":"true"}); d["spec"]["template"]["spec"]["containers"][0]["image"]=image; print(json.dumps(d))' "$svc" "$image_ref" | kubectl apply -f -

            kubectl -n "$K8S_NAMESPACE" get svc "$svc" -o json \
              | python3 -c 'import json,sys; svc=sys.argv[1]; src=json.load(sys.stdin); s={"apiVersion":src["apiVersion"],"kind":src["kind"],"metadata":{"name":f"{svc}-canary","namespace":src["metadata"]["namespace"],"labels":{"app":svc,"canary":"true"}},"spec":src["spec"]}; s["spec"]["selector"]={"app":f"{svc}-canary","canary":"true"}; [s["spec"].pop(k,None) for k in ["clusterIP","clusterIPs","ipFamilies","ipFamilyPolicy","internalTrafficPolicy"]]; print(json.dumps(s))' "$svc" | kubectl apply -f -

            kubectl -n "$K8S_NAMESPACE" patch httproute "$route" --type=json -p="[{
              \"op\": \"replace\",
              \"path\": \"/spec/rules/0/backendRefs\",
              \"value\": [
                {\"name\": \"$svc\", \"port\": $port, \"weight\": $stable_weight},
                {\"name\": \"$svc-canary\", \"port\": $port, \"weight\": $CANARY_WEIGHT}
              ]
            }]"
          done

      - name: Reset routes for non-canary deploy
        if: env.CANARY_ENABLED != 'true'
        run: |
          set -euo pipefail
          services="${{ steps.image-check.outputs.deployable_services }}"
          [ -n "$services" ] || exit 0
          route_for() {
            case "$1" in
              *-service) printf '%s-route\n' "${1%-service}" ;;
              *) printf '%s-route\n' "$1" ;;
            esac
          }
          for svc in $services; do
            route="$(route_for "$svc")"
            port="$(kubectl -n "$K8S_NAMESPACE" get svc "$svc" -o jsonpath='{.spec.ports[0].port}')"
            kubectl -n "$K8S_NAMESPACE" patch httproute "$route" --type=json -p="[{
              \"op\": \"replace\",
              \"path\": \"/spec/rules/0/backendRefs\",
              \"value\": [{\"name\": \"$svc\", \"port\": $port, \"weight\": 100}]
            }]" || true
          done

      - name: Restart config-only services
        if: steps.filter.outputs.restart_all == 'true'
        env:
          CODE_SERVICES: ${{ steps.filter.outputs.code_services }}
        run: |
          set -euo pipefail
          for svc in $SERVICE_IMAGES; do
            if echo "$CODE_SERVICES" | grep -qw "$svc"; then
              continue
            fi
            if kubectl get deploy "$svc" -n "$K8S_NAMESPACE" >/dev/null 2>&1; then
              echo "Restarting $svc (config-only)"
              kubectl rollout restart deploy/"$svc" -n "$K8S_NAMESPACE"
            fi
          done

      - name: Refresh deployed images
        if: steps.image-manifest.outputs.present != 'true' && env.CANARY_ENABLED != 'true'
        run: |
          set -euo pipefail
          services="${{ steps.image-check.outputs.deployable_services }}"
          if [ -z "$services" ] && [ "${{ steps.filter.outputs.restart_all }}" = "true" ]; then
            services="$SERVICE_IMAGES"
          fi
          if [ -z "$services" ]; then
            echo "No workload images to refresh"
            exit 0
          fi
          for svc in $services; do
            if kubectl get deploy "$svc" -n "$K8S_NAMESPACE" >/dev/null 2>&1; then
              kubectl rollout restart deploy/"$svc" -n "$K8S_NAMESPACE"
            fi
          done

      - name: Wait for rollout
        run: |
          set -euo pipefail
          services="${{ steps.image-check.outputs.deployable_services }}"
          suffix=""
          if [ "$CANARY_ENABLED" = "true" ]; then
            suffix="-canary"
          fi
          if [ -z "$services" ] && [ "${{ steps.filter.outputs.restart_all }}" = "true" ]; then
            services="$SERVICE_IMAGES"
          fi
          if [ -n "$services" ]; then
            for service in $services; do
              kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$service$suffix" --timeout=180s || true
            done
          else
            for deploy in $(kubectl get deploy -n "$K8S_NAMESPACE" -o name 2>/dev/null); do
              kubectl rollout status -n "$K8S_NAMESPACE" "$deploy" --timeout=180s || true
            done
          fi
          kubectl get pods,svc -n "$K8S_NAMESPACE"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-prod /tmp/zalord-k8s-prod.yaml
          rm -f ~/.config/sops/age/keys.txt "$KUBECONFIG"
