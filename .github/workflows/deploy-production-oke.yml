name: Deploy Production OKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag for backend services (default: prod)'
        required: false
        default: 'prod'
        type: string
      frontend_image_tag:
        description: 'Image tag for frontend (defaults to image_tag)'
        required: false
        type: string
      canary:
        description: 'Deploy as canary (configurable traffic split)'
        required: false
        default: 'false'
        type: boolean
      canary_image_tag:
        description: 'Image tag for canary pods (defaults to image_tag)'
        required: false
        type: string
      canary_services:
        description: 'Space-separated services to canary (default: CI-updated services)'
        required: false
        type: string
      canary_weight:
        description: 'Canary traffic percent, 1-99 (manual default: 50; auto can use PROD_CANARY_WEIGHT var)'
        required: false
        default: 50
        type: number
      promote:
        description: 'Auto-promote canary to stable after smoke test (default: false for demo)'
        required: false
        default: 'false'
        type: boolean
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["CI — Dev"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production-oke
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && 'prod' || github.event.inputs.image_tag || github.ref_name || 'prod' }}
      FRONTEND_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && 'prod' || github.event.inputs.frontend_image_tag || github.event.inputs.image_tag || github.ref_name || 'prod' }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-prod
      KUBECONFIG: /home/runner/.kube/oke.config
      CANARY: ${{ github.event_name == 'workflow_run' && 'true' || github.event.inputs.canary || 'false' }}
      CANARY_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.canary_image_tag || github.event.inputs.image_tag || github.ref_name || 'prod' }}
      CANARY_SERVICES: ${{ github.event.inputs.canary_services || '' }}
      CANARY_WEIGHT: ${{ github.event.inputs.canary_weight || vars.PROD_CANARY_WEIGHT || '50' }}
      PROMOTE: ${{ github.event.inputs.promote || 'false' }}
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service
        frontend
      # Service name → port mapping
      SERVICE_PORTS: >-
        auth-service:8081
        user-service:8082
        message-service:8083
        chat-service:8084
        group-service:8085
        media-service:8086
        notification-service:8087
        frontend:80

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$SOPS_AGE_KEY"
          test -n "$OKE_KUBECONFIG_B64"
          case "$CANARY_WEIGHT" in
            ''|*[!0-9]*) echo "CANARY_WEIGHT must be 1-99"; exit 1 ;;
          esac
          if [ "$CANARY_WEIGHT" -lt 1 ] || [ "$CANARY_WEIGHT" -gt 99 ]; then
            echo "CANARY_WEIGHT must be 1-99"
            exit 1
          fi
          echo "STABLE_WEIGHT=$((100 - CANARY_WEIGHT))" >> "$GITHUB_ENV"

      - name: Download CI image metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: ci-image-metadata
          path: /tmp/ci-image-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Load CI image metadata
        id: ci-meta
        run: |
          set -euo pipefail
          updated_services=""
          channel_tag=""
          if [ -f /tmp/ci-image-metadata/ci-image-metadata.env ]; then
            while IFS='=' read -r key value; do
              case "$key" in
                updated_services) updated_services="$value" ;;
                channel_tag) channel_tag="$value" ;;
              esac
            done < /tmp/ci-image-metadata/ci-image-metadata.env
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ -n "$channel_tag" ]; then
            echo "CANARY_IMAGE_TAG=$channel_tag" >> "$GITHUB_ENV"
          fi
          echo "updated_services=${updated_services:-}" >> "$GITHUB_OUTPUT"
          echo "CI updated services: ${updated_services:-none}"

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          code_services=""
          services=""
          restart_all=false

          if [ "$event" = "workflow_run" ]; then
            code_services="${{ steps.ci-meta.outputs.updated_services }}"
            head="${{ github.event.workflow_run.head_sha || github.sha }}"
            base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            if [ -n "$base" ] && git diff --name-only "$base" "$head" \
                | grep -q "^deploy/k8s/overlays/prod/.*\(config\|secret\)"; then
              restart_all=true
            fi
            services="$code_services"
          elif [ "$event" = "workflow_dispatch" ]; then
            services="$SERVICE_IMAGES"
            code_services="${CANARY_SERVICES:-}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            services="$SERVICE_IMAGES"
            code_services="$SERVICE_IMAGES"
          else
            before="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              services="$SERVICE_IMAGES"
            else
              for svc in $SERVICE_IMAGES; do
                if [ "$svc" = "frontend" ]; then
                  prefix="frontend/"
                else
                  prefix="backend/$svc/"
                fi
                if git diff --name-only "$before" "$head" | grep -q "^$prefix"; then
                  code_services="$code_services $svc"
                fi
              done
              code_services="$(echo "$code_services" | xargs)"
              services="$code_services"
              if git diff --name-only "$before" "$head" \
                  | grep -q "^deploy/k8s/overlays/prod/.*\(config\|secret\)"; then
                restart_all=true
              fi
            fi
          fi

          services="$(echo "$services" | xargs)"
          code_services="$(echo "$code_services" | xargs)"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "code_services=$code_services" >> "$GITHUB_OUTPUT"
          echo "restart_all=$restart_all" >> "$GITHUB_OUTPUT"
          echo "Detected services: ${services:-none}"
          echo "Canary candidates: ${code_services:-none}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Install deploy tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PROD }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check image existence
        id: image-check
        run: |
          set -euo pipefail

          image_exists() {
            local img=$1 svc=$2 tag=$3
            docker manifest inspect "$img" >/dev/null 2>&1 && return 0
            curl -fsS "https://hub.docker.com/v2/repositories/$DOCKER_NAMESPACE/zalord-$svc/tags/$tag" >/dev/null 2>&1
          }

          deploy_candidates="${{ steps.filter.outputs.services }}"
          [ -n "$deploy_candidates" ] || deploy_candidates="$SERVICE_IMAGES"

          deployable=""
          missing=""
          for svc in $deploy_candidates; do
            if [ "$svc" = "frontend" ]; then
              tag="$FRONTEND_IMAGE_TAG"
            else
              tag="$IMAGE_TAG"
            fi
            img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$tag"
            if image_exists "$img" "$svc" "$tag"; then
              deployable="$deployable $svc"
            else
              missing="$missing $svc"
              echo "::warning::Image not found: $img — will skip $svc"
            fi
          done
          deployable="$(echo "$deployable" | xargs)"
          missing="$(echo "$missing" | xargs)"
          echo "deployable_services=$deployable" >> "$GITHUB_OUTPUT"
          echo "Deployable: $deployable"
          [ -n "$missing" ] && echo "::warning::Skipped missing normal images: $missing" || true

          canary_deployable=""
          canary_missing=""
          canary_svc_list=""
          if [ "$CANARY" = "true" ]; then
            canary_svc_list="${CANARY_SERVICES:-${{ steps.filter.outputs.code_services }}}"
            for svc in $canary_svc_list; do
              img="docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG"
              if image_exists "$img" "$svc" "$CANARY_IMAGE_TAG"; then
                canary_deployable="$canary_deployable $svc"
              else
                canary_missing="$canary_missing $svc"
                echo "::warning::Canary image not found: $img — will skip canary $svc"
              fi
            done
          fi
          canary_deployable="$(echo "$canary_deployable" | xargs)"
          canary_missing="$(echo "$canary_missing" | xargs)"
          echo "canary_deployable_services=$canary_deployable" >> "$GITHUB_OUTPUT"
          echo "Canary deployable: $canary_deployable"
          if [ "$CANARY" = "true" ] && [ -z "$canary_svc_list" ]; then
            echo "::warning::No canary services detected. Use canary_services for manual runs, or trigger from CI."
          fi
          [ -n "$canary_missing" ] && echo "::warning::Skipped missing canary images: $canary_missing" || true

      - name: Configure OKE kubeconfig
        env:
          OKE_KUBECONFIG_B64: ${{ secrets.OKE_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$OKE_KUBECONFIG_B64" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl config get-contexts
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-prod
          deployable="${{ steps.image-check.outputs.deployable_services }}"

          cp deploy/k8s/overlays/prod/*-config.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/infra-*.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-routes.yaml /tmp/zalord-k8s-prod/
          cp deploy/k8s/overlays/prod/kong-plugins.yaml /tmp/zalord-k8s-prod/

          for secret in deploy/k8s/overlays/prod/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-prod/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          # Always include ALL workload files (image tag changes on every push)
          for f in deploy/k8s/overlays/prod/*-workload.yaml; do
            basename_f="$(basename "$f")"
            svc_name="${basename_f%-workload.yaml}"
            if grep -q '${IMAGE_TAG}' "$f" && ! echo "$deployable" | grep -qw "$svc_name"; then
              echo "  Skipping $basename_f (image not found in registry)"
              continue
            fi
            if [ "$svc_name" = "frontend" ] && [ -n "$FRONTEND_IMAGE_TAG" ]; then
              sed "s/\${IMAGE_TAG}/$FRONTEND_IMAGE_TAG/g" "$f" \
                | envsubst '${DOCKER_NAMESPACE}' > "/tmp/zalord-k8s-prod/$basename_f"
            else
              envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' < "$f" > "/tmp/zalord-k8s-prod/$basename_f"
            fi
          done

          if [ -z "$deployable" ]; then
            echo "::warning::No workload images found in registry — no image-tag workloads will be applied"
          fi

          for manifest in /tmp/zalord-k8s-prod/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-prod.yaml

      # ── Normal deploy (CANARY=false) ────────────────────────────
      - name: Apply manifests
        if: env.CANARY == 'false'
        run: |
          set -euo pipefail
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod.yaml

          services="${{ steps.filter.outputs.services }}"
          if [ -z "$services" ] && [ "${{ steps.filter.outputs.restart_all }}" = "true" ]; then
            if kubectl get deploy -n "$K8S_NAMESPACE" -o name | grep -q .; then
              kubectl rollout restart deployment -n "$K8S_NAMESPACE"
            fi
          fi

      - name: Wait for rollout
        if: env.CANARY == 'false'
        run: |
          set -euo pipefail
          services="${{ steps.filter.outputs.services }}"
          if [ -n "$services" ]; then
            # Wait for specific changed services
            for service in $services; do
              kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$service" --timeout=180s || true
            done
          else
            # No specific services detected — wait for all deployments
            for deploy in $(kubectl get deploy -n "$K8S_NAMESPACE" -o name 2>/dev/null); do
              kubectl rollout status -n "$K8S_NAMESPACE" "$deploy" --timeout=180s || true
            done
          fi
          kubectl get pods,svc -n "$K8S_NAMESPACE"

      # ── Canary deploy (CANARY=true) ─────────────────────────────
      - name: Deploy canary
        if: env.CANARY == 'true' && steps.image-check.outputs.canary_deployable_services != ''
        run: |
          set -euo pipefail

          # 1. Deploy ALL services normally with IMAGE_TAG (stable)
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod.yaml

          # Wait for stable deployments to be ready
          for svc in $SERVICE_IMAGES; do
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$svc" --timeout=120s 2>/dev/null || true
          done

          # 2. Apply routes (includes canary traffic split)
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-prod/kong-routes.yaml 2>/dev/null || true

          canary_services="${{ steps.image-check.outputs.canary_deployable_services }}"

          for svc in $canary_services; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            echo "Creating canary for $svc (port $port, image tag: $CANARY_IMAGE_TAG)..."

            # Delete old canary if exists
            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true

            # Create canary from stable deployment spec, with CANARY_IMAGE_TAG
            kubectl get deploy "$svc" -n "$K8S_NAMESPACE" -o json \
              | jq --arg name "${svc}-canary" \
                   --arg image "docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG" \
                   --arg port "$port" \
                   '.metadata.name=$name |
                    .metadata.labels."app.kubernetes.io/component"="canary" |
                    del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.generation, .status) |
                    .spec.replicas=1 |
                    .spec.selector.matchLabels.app=$name |
                    .spec.template.metadata.labels.app=$name |
                    .spec.template.spec.containers[0].image=$image |
                    .spec.template.spec.containers[0].ports[0].containerPort=(($port | tonumber)) |
                    .spec.template.spec.containers[0].env = ((.spec.template.spec.containers[0].env // []) + [{"name":"CANARY","value":"true"}])' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Canary deployment: ${svc}-canary → $CANARY_IMAGE_TAG"

            # Create canary Service (required for HTTPRoute to route traffic)
            kubectl get svc "$svc" -n "$K8S_NAMESPACE" -o json \
              | jq --arg name "${svc}-canary" \
                   --argjson port "$port" \
                   '.metadata.name=$name |
                    del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp) |
                    .spec.selector.app=$name |
                    .spec.clusterIP="" |
                    .spec.clusterIPs=[]' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Canary service: ${svc}-canary:${port}"

            # Wait for canary to be ready
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/${svc}-canary" --timeout=120s || true
          done

          echo "=== Final state ==="
          kubectl get pods,svc -n "$K8S_NAMESPACE" -o wide

      - name: Shift traffic to canary
        if: env.CANARY == 'true' && steps.image-check.outputs.canary_deployable_services != ''
        run: |
          set -euo pipefail
          for svc in ${{ steps.image-check.outputs.canary_deployable_services }}; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(case "$svc" in *-service) echo "${svc%-service}-route" ;; *) echo "$svc-route" ;; esac)

            kubectl get httproute "$route_name" -n "$K8S_NAMESPACE" -o json \
              | jq --arg svc "$svc" --argjson port "$port" \
                   --argjson stable_weight "$STABLE_WEIGHT" \
                   --argjson canary_weight "$CANARY_WEIGHT" \
                   'del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.managedFields, .status)
                    | .spec.rules |= map(.backendRefs = [
                        {"name":$svc, "port":$port, "weight":$stable_weight},
                        {"name":($svc + "-canary"), "port":$port, "weight":$canary_weight}
                      ])' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Traffic: $route_name → ${STABLE_WEIGHT}% stable / ${CANARY_WEIGHT}% canary"
          done

          kubectl get httproute -n "$K8S_NAMESPACE"

      - name: Verify canary wiring
        if: env.CANARY == 'true' && steps.image-check.outputs.canary_deployable_services != ''
        run: |
          set -euo pipefail
          for svc in ${{ steps.image-check.outputs.canary_deployable_services }}; do
            route_name=$(case "$svc" in *-service) echo "${svc%-service}-route" ;; *) echo "$svc-route" ;; esac)
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/${svc}-canary" --timeout=120s
            kubectl get httproute "$route_name" -n "$K8S_NAMESPACE" -o json \
              | jq -e --arg svc "${svc}-canary" --argjson canary_weight "$CANARY_WEIGHT" \
                  '.spec.rules[].backendRefs[] | select(.name == $svc and .weight == $canary_weight)' >/dev/null
            echo "  Verified: $route_name → ${svc}-canary weight $CANARY_WEIGHT"
          done

      - name: Promote canary to stable
        if: env.CANARY == 'true' && steps.image-check.outputs.canary_deployable_services != '' && env.PROMOTE == 'true' && success()
        run: |
          set -euo pipefail
          for svc in ${{ steps.image-check.outputs.canary_deployable_services }}; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(case "$svc" in *-service) echo "${svc%-service}-route" ;; *) echo "$svc-route" ;; esac)

            echo "Promoting $svc..."
            kubectl set image deploy "$svc" \
              "$svc=docker.io/$DOCKER_NAMESPACE/zalord-$svc:$CANARY_IMAGE_TAG" \
              -n "$K8S_NAMESPACE"
            kubectl rollout status -n "$K8S_NAMESPACE" "deployment/$svc" --timeout=120s

            kubectl get httproute "$route_name" -n "$K8S_NAMESPACE" -o json \
              | jq --arg svc "$svc" --argjson port "$port" \
                   'del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.managedFields, .status)
                    | .spec.rules |= map(.backendRefs = [{"name":$svc, "port":$port, "weight":100}])' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -

            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            echo "  Promoted: $svc → $CANARY_IMAGE_TAG"
          done

          kubectl get pods,svc,httproute -n "$K8S_NAMESPACE"

      - name: Rollback canary
        if: env.CANARY == 'true' && steps.image-check.outputs.canary_deployable_services != '' && failure()
        run: |
          set -euo pipefail
          echo "ROLLING BACK canary deployments..."
          for svc in ${{ steps.image-check.outputs.canary_deployable_services }}; do
            port=$(echo "$SERVICE_PORTS" | tr ' ' '\n' | grep "^$svc:" | cut -d: -f2)
            route_name=$(case "$svc" in *-service) echo "${svc%-service}-route" ;; *) echo "$svc-route" ;; esac)

            kubectl delete deploy "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl delete svc "${svc}-canary" -n "$K8S_NAMESPACE" --ignore-not-found=true
            kubectl get httproute "$route_name" -n "$K8S_NAMESPACE" -o json \
              | jq --arg svc "$svc" --argjson port "$port" \
                   'del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.managedFields, .status)
                    | .spec.rules |= map(.backendRefs = [{"name":$svc, "port":$port, "weight":100}])' \
              | kubectl apply -n "$K8S_NAMESPACE" -f -
            echo "  Rolled back: $svc"
          done
          kubectl get pods,svc,httproute -n "$K8S_NAMESPACE"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-prod /tmp/zalord-k8s-prod.yaml
          rm -f ~/.config/sops/age/keys.txt "$KUBECONFIG"
