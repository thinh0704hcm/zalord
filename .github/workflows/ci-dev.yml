name: CI — Dev

on:
  push:
    branches: [staging, main]
    tags: ['v*']
  pull_request:
    branches: [staging, main]

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, message-service, group-service, media-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Compile & unit tests
        run: ./mvnw -B verify -Dtest='!*ApplicationTests' -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: backend/${{ matrix.service }}

  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, chat-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/${{ matrix.service }}/go.sum
      - name: Build
        run: go build ./...
        working-directory: backend/${{ matrix.service }}
      - name: Test
        run: go test ./... -count=1 -timeout 60s
        working-directory: backend/${{ matrix.service }}

  build:
    needs: [java, go]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push all services
        run: |
          set -euo pipefail
          services="auth-service user-service message-service chat-service group-service media-service notification-service"
          for svc in $services; do
            echo "Building zalord-$svc:$IMAGE_TAG..."
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              -t "docker.io/$DOCKER_NAMESPACE/zalord-$svc:${IMAGE_TAG}" \
              "backend/$svc"
          done
          echo "All images pushed with tag $IMAGE_TAG"
