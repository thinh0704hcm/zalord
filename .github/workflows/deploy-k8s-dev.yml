name: Deploy K8s Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-k8s-dev.yml"
      - ".sops.yaml"
      - "backend/**"
      - "deploy/k8s/overlays/dev/**"

concurrency:
  group: deploy-k8s-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate required secrets
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$DOCKER_PASSWORD"
          test -n "$SOPS_AGE_KEY"
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"

      # Outputs:
      #   services — space-separated list of changed services, or empty if only
      #              overlay configs changed (no service code changed).
      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "services=$SERVICE_IMAGES" >> "$GITHUB_OUTPUT"
          else
            services=""
            for svc in $SERVICE_IMAGES; do
              if git diff --name-only "$before" "${{ github.sha }}" | grep -q "^backend/$svc/"; then
                services="$services $svc"
              fi
            done
            # Trim; leave empty if no service code changed (config-only push).
            echo "services=$(echo "$services" | xargs)" >> "$GITHUB_OUTPUT"
          fi

      # ── Image build (skipped for config-only pushes) ────────────────────────
      - name: Set up Docker Buildx
        if: steps.filter.outputs.services != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.filter.outputs.services != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push immutable images
        if: steps.filter.outputs.services != ''
        run: |
          set -euo pipefail
          for service in ${{ steps.filter.outputs.services }}; do
            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t "$DOCKER_NAMESPACE/zalord-$service:$IMAGE_TAG" \
              "backend/$service"
          done

      # ── Config / secrets prep ───────────────────────────────────────────────
      - name: Install SOPS
        run: |
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vietnam-vps
          chmod 600 ~/.ssh/vietnam-vps
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # Builds the flat bundle of YAML to apply:
      #   - namespace, ConfigMaps, decrypted Secrets — always
      #   - Deployment + Service workloads with IMAGE_TAG substituted — only
      #     when services changed, so we never reference an unbuilt image tag
      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-dev

          cp deploy/k8s/overlays/dev/namespace.yaml /tmp/zalord-k8s-dev/
          cp deploy/k8s/overlays/dev/*-config.yaml  /tmp/zalord-k8s-dev/

          for secret in deploy/k8s/overlays/dev/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-dev/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          if [ -n "${{ steps.filter.outputs.services }}" ]; then
            for f in deploy/k8s/overlays/dev/*-workload.yaml; do
              envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' \
                < "$f" > "/tmp/zalord-k8s-dev/$(basename "$f")"
            done
          fi

      # Pull images to the VPS containerd cache BEFORE applying Deployments so
      # pods start immediately with imagePullPolicy: IfNotPresent.
      - name: Pull proven immutable images
        if: steps.filter.outputs.services != ''
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            pids=()
            for service in ${{ steps.filter.outputs.services }}; do
              sudo -n /usr/local/bin/zalord-k3s-image pull \
                docker.io/${{ env.DOCKER_NAMESPACE }}/zalord-\$service:${{ env.IMAGE_TAG }} &
              pids+=(\$!)
            done
            for pid in \"\${pids[@]}\"; do wait \"\$pid\"; done
          '"

      # When services changed: Deployment image tag update triggers rolling update.
      # When config-only:      no Deployment change, so rollout restart picks up new env.
      - name: Apply manifests
        run: |
          set -euo pipefail
          for manifest in /tmp/zalord-k8s-dev/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-dev.yaml

          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash -lc 'KUBECONFIG=~/.kube/zalord-dev-deployer.config kubectl apply -n zalord-dev -f -'" \
            < /tmp/zalord-k8s-dev.yaml

          services="${{ steps.filter.outputs.services }}"
          if [ -z "$services" ]; then
            ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "bash -lc '
                export KUBECONFIG=~/.kube/zalord-dev-deployer.config
                if kubectl get deploy -n zalord-dev -o name | grep -q .; then
                  kubectl rollout restart deployment -n zalord-dev
                fi
              '"
          fi

      - name: Wait for rollout
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            export KUBECONFIG=~/.kube/zalord-dev-deployer.config
            if kubectl get deploy -n zalord-dev -o name | grep -q .; then
              for deploy in \$(kubectl get deploy -n zalord-dev -o name); do
                kubectl rollout status -n zalord-dev \"\$deploy\" --timeout=180s
              done
            fi
            kubectl get configmaps,secrets -n zalord-dev
          '"

      # ── Post-deploy image housekeeping (skipped for config-only pushes) ─────
      - name: Promote latest tags
        if: steps.filter.outputs.services != ''
        run: |
          set -euo pipefail
          for service in ${{ steps.filter.outputs.services }}; do
            docker buildx imagetools create \
              -t "$DOCKER_NAMESPACE/zalord-$service:latest" \
              "$DOCKER_NAMESPACE/zalord-$service:$IMAGE_TAG"
          done

      - name: Prune replaced images and pull latest
        if: steps.filter.outputs.services != ''
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            sudo -n /usr/local/bin/zalord-k3s-image prune
            pids=()
            for service in ${{ steps.filter.outputs.services }}; do
              sudo -n /usr/local/bin/zalord-k3s-image pull \
                docker.io/${{ env.DOCKER_NAMESPACE }}/zalord-\$service:latest &
              pids+=(\$!)
            done
            for pid in \"\${pids[@]}\"; do wait \"\$pid\"; done
          '"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-dev /tmp/zalord-k8s-dev.yaml
          rm -f ~/.ssh/vietnam-vps ~/.config/sops/age/keys.txt
