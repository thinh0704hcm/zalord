name: Deploy K8s Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-k8s-dev.yml"
      - ".sops.yaml"
      - "backend/**"
      - "deploy/k8s/overlays/dev/**"

concurrency:
  group: deploy-k8s-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$DOCKER_PASSWORD"
          test -n "$SOPS_AGE_KEY"
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push immutable images
        run: |
          set -euo pipefail
          for service in $SERVICE_IMAGES; do
            image="$DOCKER_NAMESPACE/zalord-$service:$IMAGE_TAG"
            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t "$image" \
              "backend/$service"
          done

      - name: Install SOPS
        run: |
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops
          sops --version

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vietnam-vps
          chmod 600 ~/.ssh/vietnam-vps
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-dev
          cp deploy/k8s/overlays/dev/*-config.yaml /tmp/zalord-k8s-dev/
          cp deploy/k8s/overlays/dev/namespace.yaml /tmp/zalord-k8s-dev/ 2>/dev/null || true
          for secret in deploy/k8s/overlays/dev/*-secret.example.yaml; do
            target="/tmp/zalord-k8s-dev/$(basename "${secret%.example.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

      - name: Apply manifests over SSH stdin
        run: |
          for manifest in /tmp/zalord-k8s-dev/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-dev.yaml
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "KUBECONFIG=~/.kube/zalord-dev-deployer.config kubectl apply -n zalord-dev -f -" < /tmp/zalord-k8s-dev.yaml

      - name: Pull proven immutable images
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            export KUBECONFIG=~/.kube/zalord-dev-deployer.config
            for service in ${{ env.SERVICE_IMAGES }}; do
              sudo -n /usr/local/bin/zalord-k3s-image pull docker.io/${{ env.DOCKER_NAMESPACE }}/zalord-\$service:${{ env.IMAGE_TAG }}
            done
          '"

      - name: Promote latest tags after successful deploy
        run: |
          set -euo pipefail
          for service in $SERVICE_IMAGES; do
            image="$DOCKER_NAMESPACE/zalord-$service"
            docker buildx imagetools create -t "$image:latest" "$image:$IMAGE_TAG"
          done

      - name: Prune replaced images and pull latest
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            export KUBECONFIG=~/.kube/zalord-dev-deployer.config
            if kubectl get deploy -n zalord-dev -o name | grep -q .; then
              for deploy in \$(kubectl get deploy -n zalord-dev -o name); do
                kubectl rollout status -n zalord-dev \"\$deploy\" --timeout=180s
              done
            else
              echo \"No Deployments in zalord-dev yet; pruning unused image cache only.\"
            fi
            sudo -n /usr/local/bin/zalord-k3s-image prune
            for service in ${{ env.SERVICE_IMAGES }}; do
              sudo -n /usr/local/bin/zalord-k3s-image pull docker.io/${{ env.DOCKER_NAMESPACE }}/zalord-\$service:latest
            done
            kubectl get configmaps,secrets -n zalord-dev
          '"
