name: Deploy Staging VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string
  push:
    branches:
      - staging
    paths:
      - ".github/workflows/deploy-staging-vps.yml"
      - ".sops.yaml"
      - "deploy/k8s/overlays/staging/**"

concurrency:
  group: deploy-staging-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-staging
      REMOTE_KUBECONFIG: ~/.kube/zalord-dev-deployer.config
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$IMAGE_TAG"
          test -n "$SOPS_AGE_KEY"
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"

      - name: Install deploy tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vietnam-vps
          chmod 600 ~/.ssh/vietnam-vps
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-staging

          cp deploy/k8s/overlays/staging/*-config.yaml /tmp/zalord-k8s-staging/
          cp deploy/k8s/overlays/staging/infra-*.yaml /tmp/zalord-k8s-staging/
          cp deploy/k8s/overlays/staging/kong-routes.yaml /tmp/zalord-k8s-staging/

          for secret in deploy/k8s/overlays/staging/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-staging/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          for f in deploy/k8s/overlays/staging/*-workload.yaml; do
            envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' < "$f" > "/tmp/zalord-k8s-staging/$(basename "$f")"
          done

          for manifest in /tmp/zalord-k8s-staging/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-staging.yaml

      - name: Apply manifests
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash -lc '
              set -euo pipefail
              export KUBECONFIG=${{ env.REMOTE_KUBECONFIG }}
              kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f - 2>/dev/null || \
                echo \"WARN: Could not create namespace. Checking if it exists...\"
              if ! kubectl get namespace ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
                echo \"FATAL: namespace ${{ env.K8S_NAMESPACE }} does not exist. Create it on the VPS first.\"
                exit 1
              fi
              kubectl delete job -n ${{ env.K8S_NAMESPACE }} kafka-init minio-init --ignore-not-found=true --wait=true
              kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
            '" < /tmp/zalord-k8s-staging.yaml

      - name: Wait for rollout
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            export KUBECONFIG=${{ env.REMOTE_KUBECONFIG }}
            kubectl get deploy -n ${{ env.K8S_NAMESPACE }} -o name | while read deploy; do
              kubectl rollout status -n ${{ env.K8S_NAMESPACE }} \$deploy --timeout=180s
            done
            kubectl get pods,svc -n ${{ env.K8S_NAMESPACE }}
          '"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-staging /tmp/zalord-k8s-staging.yaml
          rm -f ~/.ssh/vietnam-vps ~/.config/sops/age/keys.txt
