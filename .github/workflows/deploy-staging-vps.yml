name: Deploy Staging VPS

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - ".github/workflows/deploy-staging-vps.yml"
      - ".sops.yaml"
      - "backend/**"
      - "deploy/k8s/overlays/staging/**"

concurrency:
  group: deploy-staging-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-staging
      REMOTE_KUBECONFIG: ~/.kube/zalord-dev-deployer.config
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE"
          test -n "$DOCKER_PASSWORD"
          test -n "$SOPS_AGE_KEY"
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "services=$SERVICE_IMAGES" >> "$GITHUB_OUTPUT"
            echo "restart_all=false" >> "$GITHUB_OUTPUT"
          else
            services=""
            for svc in $SERVICE_IMAGES; do
              if git diff --name-only "$before" "${{ github.sha }}" | grep -q "^backend/$svc/"; then
                services="$services $svc"
              fi
            done
            echo "services=$(echo "$services" | xargs)" >> "$GITHUB_OUTPUT"
            if git diff --name-only "$before" "${{ github.sha }}" \
                | grep -q "^deploy/k8s/overlays/staging/.*\\(config\\|secret\\)"; then
              echo "restart_all=true" >> "$GITHUB_OUTPUT"
            else
              echo "restart_all=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.services != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.filter.outputs.services != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push immutable images
        if: steps.filter.outputs.services != ''
        run: |
          set -euo pipefail
          for service in ${{ steps.filter.outputs.services }}; do
            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t "docker.io/$DOCKER_NAMESPACE/zalord-$service:$IMAGE_TAG" \
              "backend/$service"
          done

      - name: Install deploy tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vietnam-vps
          chmod 600 ~/.ssh/vietnam-vps
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-staging

          cp deploy/k8s/overlays/staging/*-config.yaml /tmp/zalord-k8s-staging/
          cp deploy/k8s/overlays/staging/infra-*.yaml /tmp/zalord-k8s-staging/
          cp deploy/k8s/overlays/staging/kong-routes.yaml /tmp/zalord-k8s-staging/

          for secret in deploy/k8s/overlays/staging/*-secret.enc.yaml; do
            target="/tmp/zalord-k8s-staging/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
          done

          if [ -n "${{ steps.filter.outputs.services }}" ]; then
            for svc in ${{ steps.filter.outputs.services }}; do
              f="deploy/k8s/overlays/staging/$svc-workload.yaml"
              envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' \
                < "$f" > "/tmp/zalord-k8s-staging/$(basename "$f")"
            done
          fi

          for manifest in /tmp/zalord-k8s-staging/*.yaml; do
            printf '\n---\n'
            cat "$manifest"
          done > /tmp/zalord-k8s-staging.yaml

      - name: Apply manifests
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash -lc '
              set -euo pipefail
              export KUBECONFIG=${{ env.REMOTE_KUBECONFIG }}
              kubectl get namespace ${{ env.K8S_NAMESPACE }} >/dev/null
              kubectl delete job -n ${{ env.K8S_NAMESPACE }} kafka-init minio-init --ignore-not-found=true --wait=true
              kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -
            '" < /tmp/zalord-k8s-staging.yaml

          services="${{ steps.filter.outputs.services }}"
          if [ -z "$services" ] && [ "${{ steps.filter.outputs.restart_all }}" = "true" ]; then
            ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "bash -lc '
                set -euo pipefail
                export KUBECONFIG=${{ env.REMOTE_KUBECONFIG }}
                if kubectl get deploy -n ${{ env.K8S_NAMESPACE }} -o name | grep -q .; then
                  kubectl rollout restart deployment -n ${{ env.K8S_NAMESPACE }}
                fi
              '"
          fi

      - name: Wait for rollout
        run: |
          ssh -i ~/.ssh/vietnam-vps -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -lc '
            set -euo pipefail
            export KUBECONFIG=${{ env.REMOTE_KUBECONFIG }}
            services="${{ steps.filter.outputs.services }}"
            if [ -n "$services" ]; then
              for service in \$services; do
                kubectl rollout status -n ${{ env.K8S_NAMESPACE }} deployment/\$service --timeout=180s
              done
            elif [ "${{ steps.filter.outputs.restart_all }}" = "true" ] \
                && kubectl get deploy -n ${{ env.K8S_NAMESPACE }} -o name | grep -q .; then
              for deploy in \$(kubectl get deploy -n ${{ env.K8S_NAMESPACE }} -o name); do
                kubectl rollout status -n ${{ env.K8S_NAMESPACE }} \$deploy --timeout=180s
              done
            fi
            kubectl get pods,svc -n ${{ env.K8S_NAMESPACE }}
          '"

      - name: Cleanup runner artifacts
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-staging /tmp/zalord-k8s-staging.yaml
          rm -f ~/.ssh/vietnam-vps ~/.config/sops/age/keys.txt
