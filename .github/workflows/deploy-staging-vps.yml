name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (commit SHA or v1.0.0)'
        required: true
        type: string
  workflow_run:
    workflows: ["CI — Dev"]
    branches: [staging]
    types: [completed]
  push:
    branches:
      - staging
    paths:
      - ".github/workflows/deploy-staging-vps.yml"
      - ".sops.yaml"
      - "deploy/k8s/overlays/staging/**"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed (for workflow_run triggers)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      K8S_NAMESPACE: zalord-staging
      SERVICE_IMAGES: >-
        auth-service
        user-service
        message-service
        chat-service
        group-service
        media-service
        notification-service
        frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
          STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_NAMESPACE" || { echo "Missing DOCKER_USERNAME"; exit 1; }
          test -n "$IMAGE_TAG" || { echo "Missing IMAGE_TAG"; exit 1; }
          test -n "$SOPS_AGE_KEY" || { echo "Missing SOPS_AGE_KEY_STAGING"; exit 1; }
          test -n "$STAGING_KUBECONFIG_B64" || { echo "Missing STAGING_KUBECONFIG_B64"; exit 1; }

      - name: Install deploy tools
        run: |
          set -euo pipefail
          # kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
          # sops
          curl -sL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 -o /usr/local/bin/sops
          chmod 755 /usr/local/bin/sops
          # envsubst
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base

      - name: Configure kubeconfig
        env:
          STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$STAGING_KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Verify connectivity
          kubectl cluster-info
          kubectl get nodes

      - name: Configure SOPS age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_STAGING }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_run" ] \
              || [ "$before" = "0000000000000000000000000000000000000000" ] || [ -z "$before" ]; then
            echo "services=$SERVICE_IMAGES" >> "$GITHUB_OUTPUT"
            echo "restart_all=true" >> "$GITHUB_OUTPUT"
          else
            services=""
            for svc in $SERVICE_IMAGES; do
              if git diff --name-only "$before" "${{ github.sha }}" | grep -q "^backend/$svc/"; then
                services="$services $svc"
              fi
            done
            echo "services=$(echo "$services" | xargs)" >> "$GITHUB_OUTPUT"
            if git diff --name-only "$before" "${{ github.sha }}" \
                | grep -q "^deploy/k8s/overlays/staging/.*\(config\|secret\)"; then
              echo "restart_all=true" >> "$GITHUB_OUTPUT"
            else
              echo "restart_all=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/zalord-k8s-staging

          # Config files (no substitution needed)
          cp deploy/k8s/overlays/staging/*-config.yaml /tmp/zalord-k8s-staging/ 2>/dev/null || true
          cp deploy/k8s/overlays/staging/infra-*.yaml /tmp/zalord-k8s-staging/ 2>/dev/null || true

          # Kong routes
          cp deploy/k8s/overlays/staging/kong-routes.yaml /tmp/zalord-k8s-staging/ 2>/dev/null || true

          # Decrypt secrets
          for secret in deploy/k8s/overlays/staging/*-secret.enc.yaml; do
            [ -f "$secret" ] || continue
            target="/tmp/zalord-k8s-staging/$(basename "${secret%.enc.yaml}.yaml")"
            sops -d "$secret" > "$target"
            echo "  Decrypted: $(basename "$secret")"
          done

          # Workload files with image tag substitution
          for f in deploy/k8s/overlays/staging/*-workload.yaml; do
            [ -f "$f" ] || continue
            envsubst '${DOCKER_NAMESPACE} ${IMAGE_TAG}' < "$f" > "/tmp/zalord-k8s-staging/$(basename "$f")"
            echo "  Substituted: $(basename "$f")"
          done

          # Concatenate into single manifest (exclude kong-routes — applied per-ns above)
          first=true
          for manifest in /tmp/zalord-k8s-staging/*.yaml; do
            [ -f "$manifest" ] || continue
            [ "$(basename "$manifest")" = "kong-routes.yaml" ] && continue
            if [ "$first" = true ]; then
              first=false
            else
              printf '\n---\n'
            fi
            cat "$manifest"
          done > /tmp/zalord-k8s-staging.yaml

          echo "Deploy bundle: $(wc -l < /tmp/zalord-k8s-staging.yaml) lines"

      - name: Ensure namespaces
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          set -euo pipefail
          # Delete stale init jobs
          kubectl delete job -n "$K8S_NAMESPACE" kafka-init minio-init --ignore-not-found=true --wait=true 2>/dev/null || true
          # Apply kong-namespace resources (ReferenceGrant) — uses per-resource namespace from the manifest
          if [ -f /tmp/zalord-k8s-staging/kong-routes.yaml ]; then
            kubectl apply -f /tmp/zalord-k8s-staging/kong-routes.yaml
          fi
          # Apply staging-namespace resources (everything except kong-routes)
          kubectl apply -n "$K8S_NAMESPACE" -f /tmp/zalord-k8s-staging.yaml
          echo "Apply complete"

      - name: Wait for rollout
        run: |
          set -euo pipefail
          # Wait for all deployments to be ready
          for deploy in $(kubectl get deploy -n "$K8S_NAMESPACE" -o name 2>/dev/null); do
            name=$(echo "$deploy" | cut -d/ -f2)
            echo "Waiting for $name..."
            kubectl rollout status -n "$K8S_NAMESPACE" "$deploy" --timeout=180s
          done
          echo ""
          echo "=== Staging cluster state ==="
          kubectl get pods,svc -n "$K8S_NAMESPACE"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/zalord-k8s-staging /tmp/zalord-k8s-staging.yaml
          rm -f ~/.config/sops/age/keys.txt ~/.kube/config
