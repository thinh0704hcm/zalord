server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to Kong (internal) — route by path prefix
    # Order matters: longer prefixes first, shorter/overlapping after

    location = /canary {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80/api/v1/chat/canary;
        proxy_set_header Host chat.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /chat/canary {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80/api/v1/chat/canary;
        proxy_set_header Host chat.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host auth.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/users {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host user.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/messages {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host message.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/inbox {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host message.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/conversations {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host message.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/chat {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host chat.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/groups {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host group.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/media {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host media.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/notifications {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host notification.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all for other /api/ paths (sends to message-service as default)
    location /api/ {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_set_header Host message.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket to Kong
    location /ws/ {
        proxy_pass http://kong-kong-proxy.kong.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host chat.zalord.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
