spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/auth-db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRY_MINUTES}   # minutes (converted to ms in JwtUtil)
    issuer: ${JWT_ISSUER}               # must equal Kong consumer key ("zalord")

  refresh:
    expiration: ${REFRESH_EXPIRY_DAYS}  # days

# Same tuning as message-service for the media gRPC: 5 failures in 10 calls
# trips the circuit, 30s OPEN, 3 half-open probes. Register flow doesn't have
# the same volume as send-message, so the breaker mostly serves as a watchdog
# during deploys / user-service restarts.
resilience4j:
  circuitbreaker:
    instances:
      userGrpc:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

server:
  port: ${SERVER_PORT:8081}

# Actuator surfaces JVM + HTTP + custom metrics; only the endpoints below are
# exposed (health is needed for the docker healthcheck; prometheus for scraping;
# info for the build banner). Everything else stays disabled in dev.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    zalord.auth_service: ${LOG_LEVEL:DEBUG}
    org.springframework.amqp: INFO
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
