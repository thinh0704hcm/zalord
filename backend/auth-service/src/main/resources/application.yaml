spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/auth-db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRY_MINUTES}   # minutes (converted to ms in JwtUtil)
    issuer: ${JWT_ISSUER}               # must equal Kong consumer key ("zalord")

  refresh:
    expiration: ${REFRESH_EXPIRY_DAYS}  # days

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    zalord.auth_service: ${LOG_LEVEL:DEBUG}
    org.springframework.amqp: INFO
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
