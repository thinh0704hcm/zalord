spring:
  datasource:
    url: jdbc:postgresql://localhost:6433/zalord?sslmode=disable
    username: zalord_user
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        globally_quoted_identifiers: true
  data:
    redis:
      host: localhost
      port: 6380
  flyway:
    url: jdbc:postgresql://localhost:5433/zalord?sslmode=disable
    schemas: user, auth, messaging
    locations: classpath:db/migration
server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  expiry_minutes: ${JWT_EXPIRY_MINUTES}
  refresh_expiry_days: ${JWT_REFRESH_EXPIRY_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always